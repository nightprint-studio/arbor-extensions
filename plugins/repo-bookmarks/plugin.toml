name        = "repo-bookmarks"
version     = "1.0.0"
description = "Per-repo file bookmarks: pin frequently-touched paths and open them from the Command Palette."
author      = "Nightprint Studio"
repository  = "https://github.com/nightprint-studio/arbor-extensions"
category    = "ui"
keywords    = ["bookmarks", "navigation", "productivity"]
arbor_api   = 1
doc_file    = "doc.html"

[permissions]
# `git = "read"`  → arbor.repo.current() to scope storage to the active repo.
# `fs  = "read"`  → arbor.fs.exists() to skip / warn on stale bookmarks.
git = "read"
fs  = "read"

[hooks]
on_plugin_load = true
